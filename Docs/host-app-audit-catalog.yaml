      - NetworkService.get/post/put/delete
      - NetworkRequest.request
    host_search_terms:
      - APIClient
      - NetworkManager
      - NetworkService
      - URLSession
      - Endpoint
      - HTTPClient
      - Alamofire
    suspicious_file_patterns:
      - "*APIClient*"
      - "*Network*"
      - "*Endpoint*"
      - "*HTTP*"
    keep_custom_when:
      - The host app has auth-refresh, request-signing, or middleware requirements that should remain in an app-level facade above SFK.
    source_files:
      - Sources/SwapFoundationKit/Core/Networking.swift
      - Sources/SwapFoundationKit/Core/NetworkService.swift
      - Sources/SwapFoundationKit/SwapFoundationKit.swift

