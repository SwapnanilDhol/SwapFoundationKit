version: 1
module: SwapFoundationKit
last_reviewed: 2026-03-20
purpose: >
  Source-of-truth inventory for host-app redundancy audits. Use this file before
  the README examples when deciding whether an app-local abstraction should be
  replaced by SwapFoundationKit.
rules:
  - Audit against public API only.
  - Run exact-tier checks first, heuristic-tier checks second, and manual-tier checks last.
  - Prefer false negatives over noisy false positives.
  - Do not flag domain-specific wrappers when SFK only covers the low-level primitive.
capabilities:
  - id: haptics
    audit_tier: exact
    confidence: high
    replace_with:
      - HapticsHelper
    public_symbols:
      - HapticsHelper.lightImpact()
      - HapticsHelper.mediumImpact()
      - HapticsHelper.heavyImpact()
      - HapticsHelper.successNotification()
      - HapticsHelper.warningNotification()
      - HapticsHelper.errorNotification()
      - HapticsHelper.customImpact(intensity:)
    host_search_terms:
      - Haptic
      - Feedback
      - UIImpactFeedbackGenerator
      - UINotificationFeedbackGenerator
      - UISelectionFeedbackGenerator
    suspicious_file_patterns:
      - "*Haptic*"
      - "*Feedback*"
    keep_custom_when:
      - The host app intentionally abstracts non-Apple feedback backends or cross-platform behavior.
    source_files:
      - Sources/SwapFoundationKit/Services/HapticsHelper.swift

  - id: logging
    audit_tier: exact
    confidence: high
    replace_with:
      - Logger
      - LogLevel
    public_symbols:
      - Logger.info(_:)
      - Logger.debug(_:)
      - Logger.warning(_:)
      - Logger.error(_:)
      - Logger.setSendAnalyticsOnError(_:)
    host_search_terms:
      - Logger
      - LogManager
      - LogService
      - os_log
      - OSLog
      - printLog
    suspicious_file_patterns:
      - "*Logger*"
      - "*Log*"
    keep_custom_when:
      - The host app needs a structured logging backend or remote log sink that SFK does not provide.
    source_files:
      - Sources/SwapFoundationKit/Services/Logger.swift

  - id: analytics
    audit_tier: exact
    confidence: high
    replace_with:
      - AnalyticsManager
      - AnalyticsEvent
      - AnalyticsLogger
      - DefaultAnalyticsEvent
    public_symbols:
      - AnalyticsManager.shared
      - AnalyticsManager.addLogger(_:)
      - AnalyticsManager.setGlobalParameters(_:)
      - AnalyticsManager.logEvent(event:parameters:)
    host_search_terms:
      - AnalyticsManager
      - AnalyticsService
      - Telemetry
      - trackEvent
      - logEvent
      - Mixpanel
      - FirebaseAnalytics
    suspicious_file_patterns:
      - "*Analytics*"
      - "*Telemetry*"
      - "*Tracking*"
    keep_custom_when:
      - The host app uses a higher-level domain analytics facade and SFK should sit underneath it as the provider fan-out layer.
    source_files:
      - Sources/SwapFoundationKit/Services/AnalyticsProtocol.swift

  - id: user_defaults
    audit_tier: exact
    confidence: high
    replace_with:
      - UserDefault
      - UserDefaultKeyProtocol
      - UserDefaults extensions
    public_symbols:
      - UserDefault
      - UserDefaultKeyProtocol
      - UserDefaults codable helpers
      - AppStorage bridge helpers
    host_search_terms:
      - UserDefaultsManager
      - PreferencesStore
      - AppStorage
      - @AppStorage
      - DefaultsKey
      - PropertyListEncoder
    suspicious_file_patterns:
      - "*UserDefault*"
      - "*UserDefaults*"
      - "*Preference*"
      - "*SettingsStore*"
    keep_custom_when:
      - The host app needs migration, encryption, or cross-process semantics that go beyond type-safe defaults access.
    source_files:
      - Sources/SwapFoundationKit/Services/UserDefault.swift
      - Sources/SwapFoundationKit/Services/UserDefaults+.swift

