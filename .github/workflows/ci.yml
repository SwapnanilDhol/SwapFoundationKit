name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    strategy:
      matrix:
        platform: [macos-latest]
        swift-version: ["6.2"]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift-version }}

      - name: Build Package
        run: swift build -v

      - name: Run Tests
        run: swift test -v

      - name: Build for Release
        run: swift build -c release -v

      - name: Describe Package
        run: swift package describe

  ios-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS Simulator
        run: |
          xcodebuild \
            -scheme SwapFoundationKitHost \
            -project SwapFoundationKitHost/SwapFoundationKitHost.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  macos-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Build macOS (SwiftPM)
        run: swift build -v

  watchos-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build watchOS Simulator (if available)
        run: |
          if xcodebuild -showsdks | grep -q watchsimulator; then
            xcodebuild \
              -scheme SwapFoundationKit \
              -project SwapFoundationKitHost/SwapFoundationKitHost.xcodeproj \
              -destination 'generic/platform=watchOS Simulator' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              build
          else
            echo "watchOS simulator SDK not available on this runner; skipping build."
          fi

  lint-and-format:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Describe Package
        run: swift package describe
